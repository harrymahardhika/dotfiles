[env]
TERM = "alacritty"

[window]
opacity = 1
decorations = "none"
decorations_theme_variant = "Dark"
padding = { x = 4, y = 4 }

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "On" }

[font]
size = 10
offset = { x = 0, y = 2 }

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Heavy"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Heavy Italic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Medium Italic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"

[general]
live_config_reload = true
import = ["~/.config/alacritty/catppuccin-mocha.toml"]

